# =============================================================================
# GitHub Actions Workflow для автоматической сборки C-проекта
# =============================================================================

# Имя workflow, отображаемое в интерфейсе GitHub
name: C/C++ CI

# События, которые запускают этот workflow
on:
  # Запускать при пуше в ветку main
  push:
    branches:
      - main
  # Запускать при создании пул-реквеста в ветку main
  pull_request:
    branches:
      - main

# Определение задач (jobs), которые будут выполнены
jobs:
  # Задача с именем 'build'
  build:
    # Виртуальная среда для выполнения: последняя версия Ubuntu
    runs-on: ubuntu-latest
    
    # Последовательность шагов в задаче
    steps:
      # Шаг 1: Получение кода из репозитория
      - name: Checkout code
        # Использование готового действия actions/checkout версии 2
        uses: actions/checkout@v2
      
      # Шаг 2: Установка компилятора GCC и инструментов сборки
      - name: Set up GCC
        # Команда для установки build-essential в Ubuntu
        run: sudo apt-get install build-essential
      
      # Шаг 3: Очистка предыдущих сборок (на случай повторного запуска)
      - name: Clean
        # Выполнение цели 'clean' из Makefile
        run: make clean
      
      # Шаг 4: Сборка проекта
      - name: Build
        # Выполнение сборки через Makefile
        run: make
      
      # Шаг 5: Проверка архитектуры созданного файла
      - name: Check main file architecture
        # Команда file показывает тип и архитектуру исполняемого файла
        # Примечание: в задании указан ./main, но наш файл называется 'program'
        run: file ./program
      
      # Шаг 6: Установка прав на выполнение (на всякий случай)
      - name: Make main executable
        # chmod +x добавляет право на выполнение
        run: chmod +x ./program
      
      # Шаг 7: Запуск программы для проверки работоспособности
      - name: Run
        # Запуск скомпилированной программы
        run: ./program
